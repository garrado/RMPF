<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#1565c0"/>
      <stop offset="100%" stop-color="#002060"/>
    </linearGradient>
  </defs>
  <!-- background -->
  <rect width="512" height="512" rx="102" fill="url(#bg)"/>
  <!-- banknote body -->
  <rect x="58" y="148" width="396" height="236" rx="26" fill="#2e7d32"/>
  <rect x="58" y="148" width="396" height="236" rx="26" fill="none"
        stroke="#a5d6a7" stroke-width="8"/>
  <!-- inner oval -->
  <ellipse cx="256" cy="266" rx="80" ry="80" fill="#1b5e20" stroke="#a5d6a7" stroke-width="5"/>
  <!-- R$ in oval -->
  <text x="256" y="292" font-family="Arial Black,Arial,sans-serif" font-size="72"
        font-weight="900" fill="#f5c518" text-anchor="middle">R$</text>
  <!-- top-left corner label -->
  <text x="88" y="196" font-family="Arial,sans-serif" font-size="32"
        font-weight="bold" fill="#a5d6a7">RMPF</text>
  <!-- bottom-right corner label (rotated 180°) -->
  <text x="424" y="374" font-family="Arial,sans-serif" font-size="32"
        font-weight="bold" fill="#a5d6a7" text-anchor="end"
        transform="rotate(180,424,374)">RMPF</text>
  <!-- left decorative bar -->
  <line x1="86"  y1="178" x2="86"  y2="354" stroke="#a5d6a7" stroke-width="4" opacity="0.45"/>
  <!-- right decorative bar -->
  <line x1="426" y1="178" x2="426" y2="354" stroke="#a5d6a7" stroke-width="4" opacity="0.45"/>
</svg>
