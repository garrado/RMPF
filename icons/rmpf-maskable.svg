<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#1565c0"/>
      <stop offset="100%" stop-color="#002060"/>
    </linearGradient>
  </defs>
  <!-- full-bleed background (no rounded corners — OS applies its own mask) -->
  <rect width="512" height="512" fill="url(#bgm)"/>
  <!-- banknote body — pushed into safe zone (top/bottom ~10% padding = 51px) -->
  <rect x="64" y="160" width="384" height="208" rx="22" fill="#2e7d32"/>
  <rect x="64" y="160" width="384" height="208" rx="22" fill="none"
        stroke="#a5d6a7" stroke-width="8"/>
  <!-- inner oval -->
  <ellipse cx="256" cy="264" rx="72" ry="72" fill="#1b5e20" stroke="#a5d6a7" stroke-width="5"/>
  <!-- R$ -->
  <text x="256" y="287" font-family="Arial Black,Arial,sans-serif" font-size="66"
        font-weight="900" fill="#f5c518" text-anchor="middle">R$</text>
  <!-- corner labels -->
  <text x="92"  y="204" font-family="Arial,sans-serif" font-size="28"
        font-weight="bold" fill="#a5d6a7">RMPF</text>
  <text x="420" y="356" font-family="Arial,sans-serif" font-size="28"
        font-weight="bold" fill="#a5d6a7" text-anchor="end"
        transform="rotate(180,420,356)">RMPF</text>
  <!-- decorative bars -->
  <line x1="90"  y1="186" x2="90"  y2="346" stroke="#a5d6a7" stroke-width="4" opacity="0.4"/>
  <line x1="422" y1="186" x2="422" y2="346" stroke="#a5d6a7" stroke-width="4" opacity="0.4"/>
</svg>
