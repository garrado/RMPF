<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RMPF — Login</title>
  <link rel="stylesheet" href="css/rmpf.css">
  <link rel="icon" type="image/x-icon"     href="icons/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
  <link rel="icon" type="image/svg+xml"    href="icons/favicon.svg">
  <link rel="apple-touch-icon"             href="icons/apple-touch-icon.png">
  <link rel="manifest"                     href="manifest.webmanifest">
  <meta name="theme-color" content="#1565c0">
</head>
<body>
  <!-- Loading overlay shown while checking auth -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="spinner spinner-lg"></div>
    <div class="loading-text">Verificando sessão…</div>
  </div>

  <div class="login-page" id="login-page" style="display:none">
    <div class="login-card">
      <div class="login-logo">🏛️</div>
      <div class="login-title">RMPF</div>
      <div class="login-sub">Relatório Mensal de Produtividade Fiscal<br>Vigilância Sanitária — Anápolis</div>

      <div id="alert-area"></div>

      <button class="btn-google" id="btn-google">
        <!-- Google G icon -->
        <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Entrar com Google
      </button>

      <hr class="login-divider">
      <p style="font-size:.75rem;color:var(--cinzaT)">
        Somente usuários cadastrados no sistema podem acessar.
      </p>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/version.js"></script>
  <script>
    // ── CONTROLE DE VERSÃO E ATUALIZAÇÃO FORÇADA   ──────────────────────────────
    // APP_VERSION é definido em js/version.js
    const VERSION_KEY = 'rmpf_app_version';
    const savedVersion = localStorage.getItem(VERSION_KEY);

    window.__rmpfVersionReloading = false;

    if (savedVersion !== APP_VERSION) {
      console.log('\uD83D\uDD04 Atualizando de ' + (savedVersion || 'antiga') + ' para ' + APP_VERSION);
      window.__rmpfVersionReloading = true;

      // Limpa localStorage (exceto chaves do Firebase e a própria chave de versão)
      const keysToRemove = [];
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (!key.startsWith('firebase:') && key !== VERSION_KEY) keysToRemove.push(key);
      }
      keysToRemove.forEach(function (key) { localStorage.removeItem(key); });
      localStorage.setItem(VERSION_KEY, APP_VERSION);

      // Desregistra todos os Service Workers antigos e limpa caches
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (registrations) {
          const unregisterAll = registrations.map(function (reg) {
            console.log('[SW] Desregistrando: ' + reg.scope);
            return reg.unregister();
          });
          Promise.all(unregisterAll).then(function () {
            console.log('[SW] Todos os Service Workers desregistrados. Recarregando...');
            if ('caches' in window) {
              caches.keys().then(function (cacheNames) {
                return Promise.all(cacheNames.map(function (name) { return caches.delete(name); }));
              }).then(function () { location.reload(); });
            } else {
              location.reload();
            }
          });
        });
      } else {
        location.reload();
      }
    }

    // ── VERIFICAÇÃO PERIÓDICA DE ATUALIZAÇÃO .. ──────────────────────────────────
    async function checkVersionUpdate() {
      try {
        const resp = await fetch('./js/version.js?t=' + Date.now());
        if (!resp.ok) return;
        const text = await resp.text();
        const match = text.match(/APP_VERSION\s*=\s*['"]?([\d.]+)['"]?/);
        if (match && match[1] !== APP_VERSION) {
          console.log('\uD83D\uDD04 [VersionCheck] Nova versão detectada: ' + match[1] + '. Forçando atualização...');
          localStorage.setItem(VERSION_KEY, match[1]);
          location.reload();
        }
      } catch (e) {
        console.warn('[VersionCheck] Falha ao verificar versão:', e);
      }
    }
    setInterval(checkVersionUpdate, 900000); // verifica a cada 15 min
    setTimeout(checkVersionUpdate, 300000);  // verifica 5 min após abrir

    // ── REGISTRO DO SERVICE WORKER ─────────────────────────────────────────────
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./service-worker.js')
          .then(function (reg) { console.log('[SW] Registrado:', reg.scope); })
          .catch(function (err) { console.warn('[SW] Falha no registro:', err); });
      });
    }
  </script>
  <script>
    const overlay    = document.getElementById('loading-overlay');
    const loginPage  = document.getElementById('login-page');
    const alertArea  = document.getElementById('alert-area');

    function showError(msg) {
      alertArea.innerHTML = `<div class="alert alert-danger mb-2"><span class="alert-icon">🚨</span><div>${msg}</div></div>`;
    }

    // Personal devices (PWA or mobile): keep an existing session and redirect
    // straight to the dashboard, avoiding unnecessary re-authentication.
    // Desktop browsers may be shared machines, so always sign out and show
    // the login page so each user must explicitly choose their account.
    const isPWA    = window.matchMedia('(display-mode: standalone)').matches;
    // Treat as mobile when the UA matches known mobile platforms OR the device
    // reports touch capability with no fine-pointer (i.e. no mouse).
    const isMobileUA = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    const isTouchOnly = navigator.maxTouchPoints > 0 && !window.matchMedia('(pointer: fine)').matches;
    const isMobile = isMobileUA || isTouchOnly;

    if (isPWA || isMobile) {
      // Check whether a valid session already exists
      firebase.auth().onAuthStateChanged(async (user) => {
        if (user) {
          try {
            const snap = await firebase.firestore()
              .collection('usuarios').doc(user.email).get();
            if (snap.exists && (snap.data().status || '').toLowerCase() !== 'inativo') {
              window.location.href = 'dashboard.html';
              return;
            }
          } catch (e) { console.warn('[Auth] Falha ao verificar sessão pessoal:', e); }
        }
        overlay.style.display = 'none';
        loginPage.style.display = 'flex';
      });
    } else {
      // Desktop / shared machine: clear any existing session so the next user
      // must choose their own account.  Using signOut() directly here (instead
      // of onAuthStateChanged) avoids a race condition with the popup handler.
      firebase.auth().signOut().catch(() => {}).finally(() => {
        overlay.style.display = 'none';
        loginPage.style.display = 'flex';
      });
    }

    const GOOGLE_BTN_CONTENT = `<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" style="width:20px;height:20px"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg> Entrar com Google`;

    document.getElementById('btn-google').addEventListener('click', async () => {
      alertArea.innerHTML = '';
      const btn = document.getElementById('btn-google');
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div> Aguarde…';

      try {
        const result = await firebase.auth().signInWithPopup(window.googleProvider);
        const user   = result.user;

        const snap = await firebase.firestore().collection('usuarios').doc(user.email).get();

        if (!snap.exists) {
          await firebase.auth().signOut();
          btn.disabled = false;
          btn.innerHTML = GOOGLE_BTN_CONTENT;
          showError('Usuário não cadastrado no sistema. Solicite acesso ao administrador.');
          return;
        }

        const data = snap.data();
        if ((data.status || '').toLowerCase() === 'inativo') {
          await firebase.auth().signOut();
          btn.disabled = false;
          btn.innerHTML = GOOGLE_BTN_CONTENT;
          showError('Conta inativa. Entre em contato com o administrador.');
          return;
        }

        // ── Gravar dados do dispositivo no login ──────────────────
        try {
          const isPWA = window.matchMedia('(display-mode: standalone)').matches;
          const ua    = navigator.userAgent;

          let navegador = 'Desconhecido', versaoNavegador = '';
          if      (/Edg\//.test(ua))     { navegador = 'Edge';    versaoNavegador = (ua.match(/Edg\/([\d.]+)/)    ||[])[1]||''; }
          else if (/OPR\//.test(ua))     { navegador = 'Opera';   versaoNavegador = (ua.match(/OPR\/([\d.]+)/)    ||[])[1]||''; }
          else if (/Chrome\//.test(ua))  { navegador = 'Chrome';  versaoNavegador = (ua.match(/Chrome\/([\d.]+)/) ||[])[1]||''; }
          else if (/Firefox\//.test(ua)) { navegador = 'Firefox'; versaoNavegador = (ua.match(/Firefox\/([\d.]+)/)||[])[1]||''; }
          else if (/Safari\//.test(ua))  { navegador = 'Safari';  versaoNavegador = (ua.match(/Version\/([\d.]+)/)||[])[1]||''; }

          let so = 'Desconhecido';
          if      (/Windows NT ([\d.]+)/.test(ua))  so = 'Windows '  + RegExp.$1;
          else if (/Android ([\d.]+)/.test(ua))     so = 'Android '  + RegExp.$1;
          else if (/iPhone|iPad|iPod/.test(ua))     so = 'iOS '      + ((ua.match(/OS ([\d_]+)/)||[])[1]||'').replace(/_/g,'.');
          else if (/Mac OS X ([\d_]+)/.test(ua))    so = 'macOS '    + RegExp.$1.replace(/_/g,'.');
          else if (/Linux/.test(ua))                so = 'Linux';

          await firebase.firestore().collection('usuarios').doc(user.email).update({
            rmpf_ultimoLogin:     firebase.firestore.FieldValue.serverTimestamp(),
            rmpf_appVersion:      APP_VERSION,
            rmpf_userAgent:       ua,
            rmpf_navegador:       navegador,
            rmpf_versaoNavegador: versaoNavegador,
            rmpf_so:              so,
            rmpf_modoAcesso:      isPWA ? 'PWA' : 'Navegador',
            rmpf_tamanhoTela:     screen.width + 'x' + screen.height,
          });
        } catch (e) { console.warn('Falha ao registrar dados do dispositivo:', e); }

        window.location.href = 'dashboard.html';
      } catch (err) {
        btn.disabled = false;
        btn.innerHTML = GOOGLE_BTN_CONTENT;
        if (err.code !== 'auth/popup-closed-by-user') {
          showError('Erro ao entrar: ' + (err.message || err.code));
        }
      }
    });
  </script>
</body>
</html>
