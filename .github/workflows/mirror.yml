name: Mirror → visaanapolis/RMPF

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror to visaanapolis/RMPF
        run: |
          git push --mirror "https://x-access-token:${{ secrets.MIRROR_PAT }}@github.com/visaanapolis/RMPF.git"
