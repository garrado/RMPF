name: Mirror to Corporate GitHub

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  mirror:
    name: Mirror to VisaAnapolis/RMPF
    runs-on: ubuntu-latest
    if: github.repository == 'garrado/RMPF'

    steps:
      - name: Clone bare repository
        run: |
          git clone --bare https://github.com/garrado/RMPF.git repo-mirror

      - name: Push mirror to corporate repository
        run: |
          cd repo-mirror
          git push --mirror https://x-access-token:${{ secrets.PAT_CORPORATIVO }}@github.com/VisaAnapolis/RMPF.git

      - name: Trigger Pages rebuild on VisaAnapolis/RMPF
        run: |
          curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: token ${{ secrets.PAT_CORPORATIVO }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/VisaAnapolis/RMPF/pages/builds
