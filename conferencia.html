<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conferência — RMPF</title>
  <link rel="stylesheet" href="css/rmpf.css">
  <link rel="icon" type="image/x-icon"     href="icons/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
  <link rel="icon" type="image/svg+xml"    href="icons/favicon.svg">
  <link rel="apple-touch-icon"             href="icons/apple-touch-icon.png">
  <link rel="manifest"                     href="manifest.webmanifest">
  <meta name="theme-color" content="#1565c0">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body>
<div id="loading-overlay" class="loading-overlay">
  <div class="spinner spinner-lg"></div>
  <div class="loading-text">Carregando…</div>
</div>

<div class="app-layout" id="app" style="display:none">
  <header class="app-header nao-imprimir">
    <button class="hamburger" id="hamburger">☰</button>
    <div><div class="logo-text">🏛️ RMPF</div><div class="logo-sub">Produtividade Fiscal</div></div>
    <div class="header-right">
      <span class="user-name" id="header-nome">—</span>
      <button class="btn-logout" id="btn-logout">Sair</button>
    </div>
  </header>
  <nav class="app-sidebar nao-imprimir" id="sidebar"></nav>

  <main class="app-main">
    <div class="page-title">🔍 Conferência de Atividades</div>
    <div id="alert-area"></div>

    <div class="comp-selector">
      <label>Fiscal:</label>
      <select class="form-control" id="sel-fiscal" style="max-width:200px">
        <option value="">— selecione —</option>
      </select>
      <label>Competência:</label>
      <select class="form-control" id="sel-mes" style="max-width:140px"></select>
      <select class="form-control" id="sel-ano" style="max-width:90px"></select>
      <button class="btn btn-outline btn-sm" id="btn-carregar">Carregar</button>
      <button class="btn btn-outline btn-sm" id="btn-import-visa" type="button"
              style="display:none" disabled title="">
        📥 Importar Inspeções do CVS
      </button>
      <button class="btn btn-outline btn-sm" id="btn-import-visa-todos" type="button"
              style="display:none" disabled title="">
        📥 Importar Todos os Fiscais
      </button>
      <button class="btn btn-outline btn-sm" id="btn-import-sim" type="button"
              style="display:none" disabled title="">
        📥 Importar Auditorias SIM
      </button>
      <button class="btn btn-outline btn-sm" id="btn-import-sim-todos" type="button"
              style="display:none" disabled title="">
        📥 Importar SIM — Todos os Fiscais
      </button>
      <button class="btn btn-danger btn-sm" id="btn-apagar-todos" type="button"
              style="display:none" title="Apagar todos os lançamentos do mês (inclui homologados)">
        🗑️ Apagar Todos os Lançamentos
      </button>
    </div>

    <div id="import-visa-log" style="margin-bottom:8px"></div>
    <div id="import-progress-wrap" class="progress-wrap" style="display:none">
      <div class="progress-header">
        <span class="progress-label" id="import-progress-label">Processando…</span>
        <span class="progress-pct" id="import-progress-pct">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="import-progress-fill"></div>
      </div>
    </div>

    <div id="import-sim-log" style="margin-bottom:8px"></div>
    <div id="import-sim-progress-wrap" class="progress-wrap" style="display:none">
      <div class="progress-header">
        <span class="progress-label" id="import-sim-progress-label">Processando…</span>
        <span class="progress-pct" id="import-sim-progress-pct">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="import-sim-progress-fill"></div>
      </div>
    </div>

    <!-- Metric summary -->
    <div class="metrics-grid" id="metrics-wrap" style="display:none">
      <div class="metric-card azul"><div class="metric-label">PP</div><div class="metric-value" id="m-pp">—</div></div>
      <div class="metric-card verm"><div class="metric-label">PN</div><div class="metric-value" id="m-pn">—</div></div>
      <div class="metric-card amar"><div class="metric-label">PV</div><div class="metric-value" id="m-pv">—</div></div>
      <div class="metric-card verde"><div class="metric-label">Apuração</div><div class="metric-value" id="m-apur">—</div></div>
    </div>

    <div class="card">
      <div class="card-title">📋 Lançamentos Manuais</div>
      <div class="table-wrap">
        <table class="rmpf-table">
          <thead>
            <tr>
              <th>Controle</th>
              <th>Data</th>
              <th>Tipo</th>
              <th>Descrição</th>
              <th class="td-num">Pts Req.</th>
              <th class="td-num">Pts Hom.</th>
              <th>Status</th>
              <th class="nao-imprimir" id="th-acoes">Ações</th>
            </tr>
          </thead>
          <tbody id="tbody-conferencia">
            <tr class="empty-row"><td colspan="8">Selecione um fiscal e competência</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Homologação modal (Administrador) -->
    <div id="modal-hom" class="modal-backdrop" style="display:none">
      <div class="modal">
        <div class="modal-header">
          <span id="modal-title">Homologar Lançamento</span>
          <button class="modal-close" id="modal-close">✕</button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="hom-id">
          <div class="form-group">
            <label class="form-label">Tipo / Controle</label>
            <input class="form-control" id="hom-info" disabled>
          </div>
          <div class="form-group">
            <label class="form-label">Descrição</label>
            <textarea class="form-control" id="hom-desc" rows="2" disabled></textarea>
          </div>
          <div class="form-row cols-2">
            <div class="form-group">
              <label class="form-label">Pts Solicitados</label>
              <input class="form-control" id="hom-pts-req" disabled>
            </div>
            <div class="form-group">
              <label class="form-label required" for="hom-pts-hom">Pts Homologados</label>
              <input type="number" class="form-control" id="hom-pts-hom" min="0">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="hom-motivo">Motivo (obrigatório para Recusar)</label>
            <input type="text" class="form-control" id="hom-motivo" placeholder="Ex: Documento insuficiente…">
          </div>
          <div id="hom-alert"></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-default" id="modal-close2">Cancelar</button>
          <button class="btn btn-danger" id="btn-recusar">✗ Recusar</button>
          <button class="btn btn-primary" id="btn-aceitar">✓ Aceitar</button>
        </div>
      </div>
    </div>
  </main>
  <footer class="app-footer nao-imprimir">
    RMPF v<span id="footer-version"></span> — <a href="changelog.html">Changelog</a>
  </footer>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/version.js"></script>
<script src="js/utils.js"></script>
<script src="js/calculo.js"></script>
<script src="js/firestore.js"></script>
<script src="js/guard.js"></script>
<script src="js/visa-import.js"></script>
<script src="js/sim-import.js"></script>
<script>
  let _user    = null;
  let _manuais = [];
  let _grupo   = '';

  function buildSidebar(grupo) {
    const links = grupo === 'Fiscal' ? [
      ['dashboard.html','📊','Dashboard'],
      ['lancamento.html','✏️','Lançar Atividade'],
      ['meus-lancamentos.html','📋','Meus Lançamentos'],
      ['conferencia.html','🔍','Conferência'],
      ['ocorrencias.html','📌','Ocorrências'],
    ] : [
      ['dashboard.html','📊','Dashboard'],
      ['conferencia.html','🔍','Conferência'],
      ['ocorrencias.html','📌','Ocorrências'],
      ['fechamento.html','🔒','Fechamento'],
    ];
    const cur = location.pathname.split('/').pop();
    const base = links.map(([href,icon,label]) =>
      `<a href="${href}" class="sidebar-link${cur===href?' active':''}"><span class="icon">${icon}</span>${label}</a>`
    ).join('');
    const admin = grupo === 'Administrador'
      ? `<a href="admin.html" class="sidebar-link${cur==='admin.html'?' active':''}"><span class="icon">⚙️</span>Admin</a>`
      : '';
    const changelog = `<a href="changelog.html" class="sidebar-link${cur==='changelog.html'?' active':''}"><span class="icon">📜</span>Changelog</a>`;
    return base + admin + changelog;
  }

  function buildMesSelect(id) {
    const sel = document.getElementById(id);
    MESES.forEach((m, i) => {
      const o = document.createElement('option');
      o.value = i+1; o.textContent = m;
      if (i === new Date().getMonth()) o.selected = true;
      sel.appendChild(o);
    });
  }
  function buildAnoSelect(id) {
    const sel = document.getElementById(id);
    const y = new Date().getFullYear();
    for (let i = y-1; i <= y+1; i++) {
      const o = document.createElement('option');
      o.value = i; o.textContent = i;
      if (i===y) o.selected = true;
      sel.appendChild(o);
    }
  }

  async function loadFiscais() {
    const fiscais = await db_getTodosFiscais();
    const sel = document.getElementById('sel-fiscal');
    fiscais.forEach(f => {
      const o = document.createElement('option');
      o.value = f.email || f.id;
      o.textContent = f.nome || f.id;
      sel.appendChild(o);
    });
  }

  async function loadConferencia() {
    const fiscalEmail = document.getElementById('sel-fiscal').value;
    const mes  = Number(document.getElementById('sel-mes').value);
    const ano  = Number(document.getElementById('sel-ano').value);

    if (!fiscalEmail) {
      document.getElementById('alert-area').innerHTML = alerta('warn','Selecione um fiscal.');
      return;
    }
    document.getElementById('alert-area').innerHTML = '';
    const tbody = document.getElementById('tbody-conferencia');
    tbody.innerHTML = '<tr class="empty-row"><td colspan="8"><div class="spinner"></div></td></tr>';

    try {
      _manuais = await db_getManuais(fiscalEmail, mes, ano);
      const result = calcular([], _manuais, 0);
      document.getElementById('m-pp').textContent   = result.pp;
      document.getElementById('m-pn').textContent   = result.pn;
      document.getElementById('m-pv').textContent   = result.pv;
      document.getElementById('m-apur').textContent = result.apuracao;
      document.getElementById('metrics-wrap').style.display = '';
      renderTabela();
    } catch(e) {
      tbody.innerHTML = `<tr class="empty-row"><td colspan="8">${alerta('danger','Erro: '+escHtml(e.message))}</td></tr>`;
    }
  }

  function renderTabela() {
    const tbody = document.getElementById('tbody-conferencia');
    const isAdmin = _grupo === 'Administrador';

    if (!_manuais.length) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="8">Nenhum lançamento nesta competência</td></tr>';
      return;
    }

    tbody.innerHTML = _manuais.map(m => {
      const tipo = TIPOS_ATIVIDADE.find(t => t.codigo === m.tipo_codigo) || {};
      let acoes = '—';
      if (m.origem === 'visa_csv' && !isAdmin) {
        acoes = `<span class="badge badge-cvs" title="Importado do VISA">CVS</span>`;
      } else if (m.origem === 'sim_csv' && !isAdmin) {
        acoes = `<span class="badge badge-cvs" title="Importado do SIM">SIM</span>`;
      } else if (isAdmin) {
        if (m.status === 'enviado') {
          acoes = `<button class="btn btn-outline btn-sm" onclick="abrirHom('${m.id}')">📝 Homologar</button>`;
        } else if (m.status === 'aceito' || m.status === 'recusado') {
          acoes = `<button class="btn btn-default btn-sm" onclick="abrirHom('${m.id}')">✏️ Rever</button>`;
        }
      }
      return `<tr>
        <td data-label="Controle"><span class="ctrl-num">${escHtml(m.controle||'—')}</span></td>
        <td data-label="Data">${fmtData(m.data)}</td>
        <td data-label="Tipo">${tipo.nome ? escHtml(tipo.nome) : escHtml(m.tipo_codigo||'—')}</td>
        <td data-label="Descrição">${escHtml(m.descricao||'—')}</td>
        <td data-label="Pts Req." class="td-num">${m.pontos??'—'}</td>
        <td data-label="Pts Hom." class="td-num">${m.pontos_homologado!=null?m.pontos_homologado:'—'}</td>
        <td data-label="Status">${badge(m.status)}</td>
        <td data-label="Ações" class="nao-imprimir" style="white-space:nowrap">${acoes}</td>
      </tr>`;
    }).join('');
  }

  function abrirHom(id) {
    const m = _manuais.find(x => x.id === id);
    if (!m) return;
    document.getElementById('hom-id').value        = id;
    document.getElementById('hom-info').value      = `${m.controle||id} — ${m.tipo_nome||m.tipo_codigo}`;
    document.getElementById('hom-desc').value      = m.descricao || '';
    document.getElementById('hom-pts-req').value   = m.pontos ?? '';
    document.getElementById('hom-pts-hom').value   = m.pontos_homologado ?? m.pontos ?? '';
    document.getElementById('hom-motivo').value    = m.motivo_recusa || '';
    document.getElementById('hom-alert').innerHTML = '';
    document.getElementById('modal-hom').style.display = 'flex';
  }

  async function homologar(status) {
    const id     = document.getElementById('hom-id').value;
    const ponHom = document.getElementById('hom-pts-hom').value;
    const motivo = document.getElementById('hom-motivo').value.trim();
    if (status === 'recusado' && !motivo) {
      document.getElementById('hom-alert').innerHTML = alerta('warn','Informe o motivo da recusa.');
      return;
    }
    try {
      await db_updateManual(id, {
        status,
        pontos_homologado: status === 'aceito' ? Number(ponHom) : null,
        motivo_recusa: status === 'recusado' ? motivo : null,
      });
      document.getElementById('modal-hom').style.display = 'none';
      document.getElementById('alert-area').innerHTML = alerta('ok', `Lançamento <strong>${status}</strong>.`);
      loadConferencia();
    } catch(e) {
      document.getElementById('hom-alert').innerHTML = alerta('danger','Erro: '+escHtml(e.message));
    }
  }

  window.abrirHom = abrirHom;

  document.getElementById('btn-aceitar').addEventListener('click', () => homologar('aceito'));
  document.getElementById('btn-recusar').addEventListener('click', () => homologar('recusado'));
  ['modal-close','modal-close2'].forEach(id => {
    document.getElementById(id).addEventListener('click', () => {
      document.getElementById('modal-hom').style.display = 'none';
    });
  });

  requireAuth(async user => {
    _user  = user;
    _grupo = user.grupo;
    document.getElementById('loading-overlay').style.display = 'none';
    document.getElementById('app').style.display = '';
    document.getElementById('header-nome').textContent = nomeCurto(user.nome||user.email);
    document.getElementById('sidebar').innerHTML = buildSidebar(user.grupo);
    document.getElementById('footer-version').textContent = window.APP_VERSION || '';

    // Fiscal only sees own data
    if (user.grupo === 'Fiscal') {
      const sel = document.getElementById('sel-fiscal');
      sel.innerHTML = `<option value="${escHtml(user.email)}">${escHtml(user.nome||user.email)}</option>`;
      sel.disabled = true;
      // Hide actions column
      document.getElementById('th-acoes').style.display = 'none';
    } else {
      await loadFiscais();
    }

    // ── Importação VISA (admin/administrativo) ───────────
    const btnImportVisa      = document.getElementById('btn-import-visa');
    const btnImportVisaTodos = document.getElementById('btn-import-visa-todos');
    const btnImportSim       = document.getElementById('btn-import-sim');
    const btnImportSimTodos  = document.getElementById('btn-import-sim-todos');
    const btnApagarTodos     = document.getElementById('btn-apagar-todos');
    if (_grupo !== 'Fiscal') {
      btnImportVisa.style.display      = '';
      btnImportVisaTodos.style.display = '';
      btnImportSim.style.display       = '';
      btnImportSimTodos.style.display  = '';
    }
    if (_grupo === 'Administrador') {
      btnApagarTodos.style.display = '';
    }

    function atualizarBtnImportConf() {
      const mes = Number(document.getElementById('sel-mes').value);
      const ano = Number(document.getElementById('sel-ano').value);
      if (!visaMesAberto(mes, ano)) {
        btnImportVisa.disabled      = true;
        btnImportVisa.title         = 'Mês anterior a Abril/2026 — impossível importar';
        btnImportVisaTodos.disabled = true;
        btnImportVisaTodos.title    = 'Mês anterior a Abril/2026 — impossível importar';
      } else {
        btnImportVisa.disabled      = false;
        btnImportVisa.title         = 'Importar inspeções do VISA para o fiscal selecionado';
        btnImportVisaTodos.disabled = false;
        btnImportVisaTodos.title    = 'Importar inspeções do VISA para todos os fiscais';
      }
      if (!simMesAberto(mes, ano)) {
        btnImportSim.disabled      = true;
        btnImportSim.title         = 'Mês anterior a Abril/2026 — impossível importar';
        btnImportSimTodos.disabled = true;
        btnImportSimTodos.title    = 'Mês anterior a Abril/2026 — impossível importar';
      } else {
        btnImportSim.disabled      = false;
        btnImportSim.title         = 'Importar auditorias do SIM para o fiscal selecionado';
        btnImportSimTodos.disabled = false;
        btnImportSimTodos.title    = 'Importar auditorias do SIM para todos os fiscais';
      }
    }
    document.getElementById('sel-mes').addEventListener('change', atualizarBtnImportConf);
    document.getElementById('sel-ano').addEventListener('change', atualizarBtnImportConf);

    const progressWrap  = document.getElementById('import-progress-wrap');
    const progressLabel = document.getElementById('import-progress-label');
    const progressPct   = document.getElementById('import-progress-pct');
    const progressFill  = document.getElementById('import-progress-fill');

    function mostrarProgresso(atual, total) {
      if (!total) return;
      progressWrap.style.display = '';
      const pct = Math.round((atual / total) * 100);
      progressFill.style.width  = pct + '%';
      progressPct.textContent   = pct + '%';
      progressLabel.textContent = `Processando inspeção ${atual} de ${total}…`;
    }
    function ocultarProgresso() {
      progressWrap.style.display = 'none';
      progressFill.style.width   = '0%';
    }

    btnImportVisa.addEventListener('click', async () => {
      const fiscalEmail = document.getElementById('sel-fiscal').value;
      const mes  = Number(document.getElementById('sel-mes').value);
      const ano  = Number(document.getElementById('sel-ano').value);
      if (!fiscalEmail) {
        document.getElementById('alert-area').innerHTML = alerta('warn', 'Selecione um fiscal antes de importar.');
        return;
      }
      const logEl  = document.getElementById('import-visa-log');
      const btn    = btnImportVisa;
      btn.disabled = true;
      logEl.innerHTML = '';
      ocultarProgresso();
      const msgs = [];
      const onProgress = (msg, type) => {
        msgs.push(alerta(type, msg));
        logEl.innerHTML = msgs.slice(-6).join('');
      };
      try {
        const allFiscais = await db_getTodosFiscais();
        await importarInspecoesVISA({ fiscalEmail, mes, ano, allFiscais, onProgress, onProgressBar: mostrarProgresso });
        loadConferencia();
      } catch(e) {
        logEl.innerHTML += alerta('danger', '🚨 Erro inesperado: ' + escHtml(e.message));
      } finally {
        btn.disabled = !visaMesAberto(mes, ano);
        ocultarProgresso();
      }
    });

    btnImportVisaTodos.addEventListener('click', async () => {
      const mes = Number(document.getElementById('sel-mes').value);
      const ano = Number(document.getElementById('sel-ano').value);
      const selMesEl = document.getElementById('sel-mes');
      const mesNome = selMesEl.options[selMesEl.selectedIndex]?.text || mes;
      if (!confirm(`Importar inspeções do VISA para TODOS os fiscais em ${mesNome}/${ano}?\n\nEsta ação pode criar ou atualizar lançamentos de múltiplos fiscais.`)) return;
      const logEl = document.getElementById('import-visa-log');
      const btn   = btnImportVisaTodos;
      btn.disabled = true;
      btnImportVisa.disabled = true;
      logEl.innerHTML = '';
      ocultarProgresso();
      const msgs = [];
      const onProgress = (msg, type) => {
        msgs.push(alerta(type, msg));
        logEl.innerHTML = msgs.slice(-6).join('');
      };
      try {
        const allFiscais = await db_getTodosFiscais();
        await importarInspecoesVISA({ fiscalEmail: null, mes, ano, allFiscais, onProgress, onProgressBar: mostrarProgresso });
        loadConferencia();
      } catch(e) {
        logEl.innerHTML += alerta('danger', '🚨 Erro inesperado: ' + escHtml(e.message));
      } finally {
        const aberto = visaMesAberto(mes, ano);
        btn.disabled = !aberto;
        btnImportVisa.disabled = !aberto;
        ocultarProgresso();
      }
    });

    btnApagarTodos.addEventListener('click', async () => {
      const mes = Number(document.getElementById('sel-mes').value);
      const ano = Number(document.getElementById('sel-ano').value);
      const selMesEl2 = document.getElementById('sel-mes');
      const mesNome = selMesEl2.options[selMesEl2.selectedIndex]?.text || mes;
      if (!confirm(`⚠️ Apagar TODOS os lançamentos de ${mesNome}/${ano}?\n\nEsta ação é IRREVERSÍVEL e inclui lançamentos já homologados.`)) return;
      if (!confirm(`Confirmação final: apagar TODOS os lançamentos de ${mesNome}/${ano}, incluindo os homologados?`)) return;
      const logEl = document.getElementById('import-visa-log');
      btnApagarTodos.disabled = true;
      logEl.innerHTML = alerta('info', '🗑️ Apagando lançamentos…');
      let lockAcquired = false;
      try {
        await window.db_acquireVisaImportLock(mes, ano, _user.email, _user.nome || _user.email);
        lockAcquired = true;
        const total = await db_deleteManuaisTodosMes(mes, ano);
        logEl.innerHTML = alerta('ok', `✅ ${total} lançamento(s) apagado(s) em ${mesNome}/${ano}.`);
        loadConferencia();
      } catch(e) {
        logEl.innerHTML = alerta('danger', '🚨 Erro ao apagar: ' + escHtml(e.message));
      } finally {
        if (lockAcquired) await window.db_releaseVisaImportLock(mes, ano);
        btnApagarTodos.disabled = false;
      }
    });

    // ── Importação SIM (admin/administrativo) ────────────
    const simProgressWrap  = document.getElementById('import-sim-progress-wrap');
    const simProgressLabel = document.getElementById('import-sim-progress-label');
    const simProgressPct   = document.getElementById('import-sim-progress-pct');
    const simProgressFill  = document.getElementById('import-sim-progress-fill');

    function mostrarProgressoSim(atual, total) {
      if (!total) return;
      simProgressWrap.style.display = '';
      const pct = Math.round((atual / total) * 100);
      simProgressFill.style.width  = pct + '%';
      simProgressPct.textContent   = pct + '%';
      simProgressLabel.textContent = `Processando auditoria ${atual} de ${total}…`;
    }
    function ocultarProgressoSim() {
      simProgressWrap.style.display = 'none';
      simProgressFill.style.width   = '0%';
    }

    btnImportSim.addEventListener('click', async () => {
      const fiscalEmail = document.getElementById('sel-fiscal').value;
      const mes  = Number(document.getElementById('sel-mes').value);
      const ano  = Number(document.getElementById('sel-ano').value);
      if (!fiscalEmail) {
        document.getElementById('alert-area').innerHTML = alerta('warn', 'Selecione um fiscal antes de importar.');
        return;
      }
      const logEl  = document.getElementById('import-sim-log');
      const btn    = btnImportSim;
      btn.disabled = true;
      logEl.innerHTML = '';
      ocultarProgressoSim();
      const msgs = [];
      const onProgress = (msg, type) => {
        msgs.push(alerta(type, msg));
        logEl.innerHTML = msgs.slice(-6).join('');
      };
      try {
        const allFiscais = await db_getTodosFiscais();
        await importarAuditoriasSIM({ fiscalEmail, mes, ano, allFiscais, onProgress, onProgressBar: mostrarProgressoSim });
        loadConferencia();
      } catch(e) {
        logEl.innerHTML += alerta('danger', '🚨 Erro inesperado: ' + escHtml(e.message));
      } finally {
        btn.disabled = !simMesAberto(mes, ano);
        ocultarProgressoSim();
      }
    });

    btnImportSimTodos.addEventListener('click', async () => {
      const mes = Number(document.getElementById('sel-mes').value);
      const ano = Number(document.getElementById('sel-ano').value);
      const selMesEl = document.getElementById('sel-mes');
      const mesNome = selMesEl.options[selMesEl.selectedIndex]?.text || mes;
      if (!confirm(`Importar auditorias do SIM para TODOS os fiscais em ${mesNome}/${ano}?\n\nEsta ação pode criar ou atualizar lançamentos de múltiplos fiscais.`)) return;
      const logEl = document.getElementById('import-sim-log');
      const btn   = btnImportSimTodos;
      btn.disabled = true;
      btnImportSim.disabled = true;
      logEl.innerHTML = '';
      ocultarProgressoSim();
      const msgs = [];
      const onProgress = (msg, type) => {
        msgs.push(alerta(type, msg));
        logEl.innerHTML = msgs.slice(-6).join('');
      };
      try {
        const allFiscais = await db_getTodosFiscais();
        await importarAuditoriasSIM({ fiscalEmail: null, mes, ano, allFiscais, onProgress, onProgressBar: mostrarProgressoSim });
        loadConferencia();
      } catch(e) {
        logEl.innerHTML += alerta('danger', '🚨 Erro inesperado: ' + escHtml(e.message));
      } finally {
        const aberto = simMesAberto(mes, ano);
        btn.disabled = !aberto;
        btnImportSim.disabled = !aberto;
        ocultarProgressoSim();
      }
    });

    buildMesSelect('sel-mes');
    buildAnoSelect('sel-ano');
    atualizarBtnImportConf();

    // Pre-fill from URL params
    const params = new URLSearchParams(location.search);
    if (params.get('fiscal')) document.getElementById('sel-fiscal').value = params.get('fiscal');
    if (params.get('mes'))    document.getElementById('sel-mes').value    = params.get('mes');
    if (params.get('ano'))    document.getElementById('sel-ano').value    = params.get('ano');
    if (params.get('fiscal')) loadConferencia();

    document.getElementById('btn-carregar').addEventListener('click', loadConferencia);
    document.getElementById('btn-logout').addEventListener('click', () => {
      firebase.auth().signOut().then(() => { window.location.href = 'index.html'; });
    });
    document.getElementById('hamburger').addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('open');
    });
  });
</script>
</body>
</html>
